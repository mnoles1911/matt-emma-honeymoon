eals and dolphins. Kawarau Bridge bungee, Shotover jet boat, gondola luge.",acts:["Milford Sound Cruise","Kawarau Bungee","Shotover Jet Boat","Queenstown Hill Hike"],px:604,py:312,img:"https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=800&q=80"}],Zd=[{day:1,di:0,title:"Arrive Cairns → Drive to Daintree",desc:"After ~28 hours of travel (DCA/IAD → LA or Dallas → CNS via Qantas), collect your rental car at Cairns Airport and drive ~2.5 hours north along the Captain Cook Highway. Check in, unwind, dinner on the outdoor deck as the forest comes alive around you."},{day:2,di:0,title:"Full Daintree Immersion",desc:"A full day deep in the world's oldest living rainforest. Morning guided cassowary walk with a naturalist guide. Afternoon croc river cruise on the Daintree River — spotting saltwater crocodiles and exotic birds from the water. Evening: guided night walk to find glowing fungi, tree frogs, and nocturnal creatures."},{day:3,di:0,title:"Cape Tribulation Day Trip",desc:"Drive 45 minutes north to Cape Tribulation — the only place on Earth where two UNESCO World Heritage sites meet at the same beach. Ancient rainforest tumbles directly into the Coral Sea. Spend the day on beach walks, rainforest boardwalks, kayaking through the mangroves, and swimming."},{day:4,di:1,title:"Morning Free → Fly to Whitsundays",desc:"Final morning in the Daintree at your own pace. Drive south to Cairns, return the rental car, and board your short flight to Hamilton Island (CNS → HTI, ~1h 15m, Qantas or East Air). Airport transfer direct to qualia. Champagne welcome, check into your private Coral Sea pavilion."},{day:5,di:1,title:"Arrive & Settle at qualia",desc:"Your first full day at Australia's finest resort. No agenda — this is exactly the point. Explore the resort, use the spa, swim in the infinity pool, and watch the Coral Sea turn gold at sunset. Degustation dinner at The Long Pavilion to close the night."},{day:6,di:1,title:"Whitehaven Beach",desc:"Full-day boat excursion to Whitehaven Beach — 7km of 98% pure silica sand, the world's whitest. Snorkel at Hill Inlet and Blue Pearl Bay. Watch the swirling sand and tidal patterns from the lookout. Return for sunset cocktails on your private deck."},{day:7,di:1,title:"Great Barrier Reef — Full Day",desc:"The crown jewel of the trip. Full-day outer reef excursion to Fairey Reef or Bait Reef — one of the Seven Natural Wonders of the World. Snorkel or scuba among turtles, reef sharks, manta rays, and breathtaking coral formations. qualia's concierge arranges everything."},{day:8,di:2,title:"Fly to Marlborough Wine Country",desc:"HTI → Auckland via Brisbane (~8 hrs, Qantas or Air NZ), then AKL → BHE nonstop (~1h 30m, Air NZ daily). Arrive in the heart of Sauvignon Blanc country. Transfer to the vineyard hotel. Canapes and wine by the fireplace on arrival — the harvest season here is spectacular in March/April."},{day:9,di:2,title:"Cycle the Wine Trail",desc:"Rent e-bikes from the hotel and spend the day on the Marlborough wine trail. Stop at Cloudy Bay, Brancott Estate, and Nautilus for tastings. Gourmet vineyard picnic lunch among the vines. Return for a fireside evening with the hotel's curated wine selection."},{day:10,di:2,title:"Marlborough Sounds",desc:"Sea kayak or take a cruise through the drowned sea valleys of the Marlborough Sounds — ancient submerged landscape of forested ridgelines, clear bays, and wildlife. Spot fur seals, dolphins, and native birds. Optional: Queen Charlotte Track hike along the ridgeline above the Sounds."},{day:11,di:3,title:"Fly to Queenstown",desc:"Morning free in Marlborough. BHE → ZQN via Auckland (~2.5 hrs with connection, Air NZ). Arrive in the adventure capital early afternoon. Check in to Queenstown Park — a short walk from the gondola. Ride up for panoramic dinner views over Lake Wakatipu and the Remarkables."},{day:12,di:3,title:"Queenstown Adventure Day",desc:"Pick your adventure. The world-original Kawarau Bridge bungee jump (1988, $170/person). White-water jet boat on the Shotover River through metre-wide canyons. Or the gondola luge for something more leisurely. Evening happy hour — wine and canapes with other guests."},{day:13,di:3,title:"Milford Sound — Full Day",desc:"Depart 6am. Drive through Fiordland National Park and the Homer Tunnel. Cruise past Mitre Peak — one of the most photographed mountains on Earth — alongside roaring waterfalls that double in size after rain, colonies of fur seals basking on the rocks, and bottlenose dolphins. Back by 8pm."},{day:14,di:3,title:"Final Morning → Fly Home",desc:"Morning hike up Queenstown Hill for farewell panoramic views over Lake Wakatipu and the Remarkables. Last coffee on Church Street. Board ZQN → DCA via Los Angeles (Qantas + American, ~24 hrs). ✈️"}],Yd=[{seg:"DCA/IAD → CNS",info:"Qantas via Los Angeles or Dallas · ~28 hrs total",cost:"~$1,300–1,600 pp"},{seg:"CNS → HTI",info:"Qantas or East Air · direct · ~1h 15m",cost:"~$200–400 pp"},{seg:"HTI → AKL",info:"Qantas or Air NZ · via Brisbane · ~8 hrs",cost:"~$370–500 pp"},{seg:"AKL → BHE",info:"Air New Zealand · nonstop · ~1h 30m",cost:"~$80–150 pp"},{seg:"BHE → ZQN",info:"Air NZ via Auckland · ~2.5 hrs",cost:"~$120–210 pp"},{seg:"ZQN → DCA",info:"Qantas + American via Los Angeles · ~24 hrs",cost:"incl. in roundtrip"}],Xd=[{region:"🇦🇺 Daintree & Cairns",items:[{name:"Hot Air Balloon, Atherton Tablelands",desc:"Dawn flight over the tablelands with champagne landing. ~$250–350/person.",replaces:"Swap: croc cruise (Day 2)"},{name:"Aboriginal Cultural Experience (Tjapukai)",desc:"First Nations culture, storytelling, dance, and bushfood. Half day from Cairns.",replaces:"Swap: night walk (Day 2)"},{name:"Sea Kayak Overnight, Cape Trib",desc:"Through mangroves to remote beaches. Guided, gear included. ~$300/person.",replaces:"Swap: Cape Trib day trip (Day 3)"},{name:"Waterfall Circuit, Atherton Tablelands",desc:"Millaa Millaa, Zillie, Elinjaa Falls. Swimming holes, tree kangaroos. Self-drive.",replaces:"Swap: cassowary walk (Day 2)"}]},{region:"🇦🇺 Whitsundays & Reef",items:[{name:"Seaplane over Heart Reef",desc:"Fly over Heart Reef, water landing at a secluded lagoon. ~$500–700/person.",replaces:"Swap: reef cruise (Day 7)"},{name:"Bareboat Catamaran Charter",desc:"Sail your own cat among 74 islands for a day. No licence needed for day hire.",replaces:"Swap: Whitehaven trip (Day 6)"},{name:"Intro PADI Dive, Outer Reef",desc:"1-day beginner dive arranged by qualia concierge. ~$250/person.",replaces:"Add-on: Day 7 reef day"},{name:"Passage Peak Hike, Hamilton Island",desc:"Island's highest point. 2hr return, panoramic reef views. Free.",replaces:"Add-on: any morning"}]},{region:"🇳🇿 Marlborough",items:[{name:"Marlborough Sounds Wilderness Cruise",desc:"Full-day boat through sea-drowned valleys, native forest, seals, dolphins. ~$150–200/person.",replaces:"Swap: Queen Charlotte walk (Day 10)"},{name:"Picton → Wellington by Interislander Ferry",desc:"3.5 hr crossing through the Sounds. Add a Wellington night before flying to Queenstown.",replaces:"Alternative routing"},{name:"Omaka Aviation Heritage Centre",desc:"Peter Jackson's private WW1 & WW2 aircraft collection. Half day in Blenheim.",replaces:"Add-on: afternoon (Day 9 or 10)"},{name:"Bay of Islands instead of Marlborough",desc:"Fly Auckland → Kerikeri. Sailing, dolphins, Waitangi Treaty Grounds. More nature, less wine.",replaces:"Replaces: Marlborough entirely"}]},{region:"🇳🇿 Queenstown",items:[{name:"Wanaka Day Trip",desc:"Lake Wanaka, the lone tree, Roy's Peak hike. 45 min from Queenstown. Perfect Milford weather backup.",replaces:"Swap: Milford Sound (Day 13)"},{name:"Skydive over Lake Wakatipu",desc:"15,000 ft tandem over the Remarkables. ~$300–400/person.",replaces:"Swap: bungee (Day 12)"},{name:"Glenorchy & Paradise Valley",desc:"Lord of the Rings locations. Horseback, jet boat, glacial valley. 45 min from QT.",replaces:"Swap: jet boat (Day 12)"},{name:"Ziptrek Ecotours",desc:"6 ziplines through ancient beech fores
