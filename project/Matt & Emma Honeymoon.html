<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,600&display=swap" rel="stylesheet"/>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root{
  --bg:#091522;--bg2:#0c1d2e;--card:#132033;--card2:#182840;
  --border:#1d3450;--accent:#5aafd0;--gold:#c9944a;--gold2:#e8c07a;
  --text:#ddeeff;--muted:#5e7a96;
  --serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}

.nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:18px 48px;background:linear-gradient(to bottom,rgba(9,21,34,.95),transparent)}
.nav-brand{font-family:var(--serif);font-size:16px;color:var(--gold2);font-style:italic;letter-spacing:.04em}
.nav-links{display:flex;gap:22px;list-style:none}
.nav-links a{color:var(--muted);text-decoration:none;font-size:11px;letter-spacing:.13em;text-transform:uppercase;transition:color .2s}
.nav-links a:hover{color:var(--text)}

.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;text-align:center;padding:100px 32px 80px}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 100% 80% at 50% 30%,#183d62 0%,#091522 65%)}
.hero-pre{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;position:relative;z-index:2}
.hero-name{font-family:var(--serif);font-size:clamp(60px,9vw,108px);line-height:1;position:relative;z-index:2;margin-bottom:10px}
.hero-name em{color:var(--gold2);font-style:italic}
.hero-route{font-family:var(--serif);font-size:clamp(15px,2vw,22px);color:var(--muted);margin-bottom:60px;font-style:italic;letter-spacing:.06em;position:relative;z-index:2}
.countdown{display:flex;align-items:flex-start;gap:6px;justify-content:center;position:relative;z-index:2}
.cd-unit{text-align:center;min-width:78px}
.cd-num{font-family:var(--serif);font-size:clamp(42px,6vw,68px);color:var(--text);line-height:1}
.cd-lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:6px}
.cd-sep{font-family:var(--serif);font-size:44px;color:var(--border);margin-top:10px;line-height:1}
.hero-cta{margin-top:52px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;position:relative;z-index:2}
.btn-p{background:var(--accent);color:#091522;border:none;padding:13px 32px;border-radius:3px;font-family:var(--sans);font-size:12px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;font-weight:600;transition:opacity .2s}
.btn-p:hover{opacity:.82}
.btn-g{background:transparent;color:var(--text);border:1px solid var(--border);padding:13px 32px;border-radius:3px;font-family:var(--sans);font-size:12px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:border-color .2s,color .2s}
.btn-g:hover{border-color:var(--accent);color:var(--accent)}

.sw{padding:96px 0}.alt{background:var(--bg2)}
.si{max-width:1060px;margin:0 auto;padding:0 48px}
.sec-pre{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.sec-h{font-family:var(--serif);font-size:clamp(30px,4vw,48px);color:var(--text);margin-bottom:14px}
.sec-h em{color:var(--gold2);font-style:italic}
.sec-sub{color:var(--muted);font-size:15px;line-height:1.75;max-width:520px;margin-bottom:44px}

/* MAP */
.map-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;position:relative}
.map-svg{width:100%;display:block}
.pgrp{cursor:pointer}
.mpopup{position:absolute;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:13px 17px;min-width:185px;z-index:50;box-shadow:0 12px 40px rgba(0,0,0,.7);pointer-events:none}
.mpopup-pre{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.mpopup-name{font-family:var(--serif);font-size:16px;color:var(--gold2);margin-bottom:2px}
.mpopup-sub{font-size:11px;color:var(--muted);margin-bottom:5px}
.mpopup-price{font-size:12px;color:var(--text)}

/* DAY CARDS */
.dc{border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px;overflow:hidden;transition:border-color .2s}
.dc.open{border-color:var(--accent)}
.dc-hd{display:flex;align-items:center;gap:20px;padding:17px 22px;cursor:pointer;background:var(--card);transition:background .15s}
.dc-hd:hover{background:var(--card2)}
.dc-n{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--muted);min-width:52px;transition:color .2s}
.dc.open .dc-n{color:var(--accent)}
.dc-info{flex:1}
.dc-title{font-size:15px;font-weight:500;color:var(--text)}
.dc-where{font-size:12px;color:var(--muted);margin-top:2px}
.dc-arr{color:var(--muted);font-size:16px;transition:transform .3s;flex-shrink:0}
.dc.open .dc-arr{transform:rotate(180deg)}
.dc-body{padding:20px 22px 24px;background:var(--bg);border-top:1px solid var(--border)}
.dc-hotel{font-size:12px;color:var(--accent);margin-bottom:10px}
.dc-text{font-size:14px;color:var(--muted);line-height:1.85}
.tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.tag{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3px 11px;font-size:11px;color:var(--muted)}
.tag.au{border-color:#2a5c3a;color:#5aafd0}
.tag.nz{border-color:#5c4a20;color:var(--gold2)}

/* SPOTLIGHTS */
.spots{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:transform .2s,box-shadow .2s}
.scard:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
.scard-img{height:180px;position:relative;overflow:hidden}
.scard-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.scard:hover .scard-img img{transform:scale(1.05)}
.scard-body{padding:18px 20px}
.scard-pre{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.scard-name{font-family:var(--serif);font-size:20px;color:var(--text);margin-bottom:3px}
.scard-hotel{font-size:12px;color:var(--muted);margin-bottom:9px}
.scard-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:9px}
.scard-price{font-size:13px;color:var(--gold2)}

/* GALLERY */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.gcell{border-radius:8px;overflow:hidden;aspect-ratio:4/3;position:relative;background:var(--card2);cursor:pointer}
.gcell img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s,opacity .3s}
.gcell:hover img{transform:scale(1.06)}
.gcell-label{position:absolute;bottom:0;left:0;right:0;padding:28px 10px 9px;background:linear-gradient(to top,rgba(9,21,34,.85),transparent);font-size:11px;color:rgba(220,240,255,.8);font-family:monospace;letter-spacing:.04em;opacity:0;transition:opacity .3s}
.gcell:hover .gcell-label{opacity:1}
.gcell-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;font-family:monospace}

/* FLIGHTS */
.flights-block{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.flights-hd{padding:22px 26px;border-bottom:1px solid var(--border)}
.flights-hd-title{font-family:var(--serif);font-size:22px;color:var(--text);margin-bottom:3px}
.flights-hd-sub{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.flight-row{display:grid;grid-template-columns:140px 1fr auto;gap:16px;align-items:baseline;padding:13px 26px;border-bottom:1px solid var(--border)}
.flight-row:last-of-type{border-bottom:none}
.flight-seg{font-family:'DM Sans',monospace;font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.04em}
.flight-info{font-size:13px;color:var(--muted)}
.flight-cost{font-size:12px;color:var(--gold2);text-align:right;white-space:nowrap}
.flight-tip{padding:14px 26px;background:var(--bg);border-top:1px solid var(--border);font-size:12px;color:var(--muted);line-height:1.7}

/* SWAP MENU */
.swap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-bottom:36px}
.swap-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;transition:border-color .2s}
.swap-card:hover{border-color:var(--accent)}
.swap-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:5px}
.swap-desc{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:7px}
.swap-replaces{font-size:11px;color:var(--accent);letter-spacing:.03em}
.swap-region-lbl{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold2);margin-bottom:12px;margin-top:32px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* CHECKS */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:5px 20px}
.crow{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 0;border-bottom:1px solid rgba(29,52,80,.55)}
.crow input{accent-color:var(--accent);width:15px;height:15px;cursor:pointer;flex-shrink:0}
.crow span{font-size:14px;color:var(--muted);transition:color .15s}
.crow.done span{color:var(--border);text-decoration:line-through}

/* BUDGET */
.btable{width:100%;border-collapse:collapse}
.btable th{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
.btable td{padding:11px 14px;border-bottom:1px solid rgba(29,52,80,.35);font-size:13px}
.bbar-bg{background:var(--border);border-radius:3px;height:5px}
.bbar{border-radius:3px;height:5px}

.fi{opacity:0;transform:translateY(22px);transition:opacity .75s ease,transform .75s ease}
.fi.vis{opacity:1;transform:none}
.divider{height:1px;background:linear-gradient(to right,transparent,var(--border),transparent)}
.footer{padding:64px 48px;text-align:center;border-top:1px solid var(--border)}
.fq{font-family:var(--serif);font-size:clamp(17px,2.5vw,26px);color:var(--gold2);font-style:italic;margin-bottom:10px}
.fm{font-size:13px;color:var(--muted);letter-spacing:.06em}

/* Placeholder fallback */
.ph-img{width:100%;height:100%;background:var(--card2);display:flex;align-items:flex-end;position:relative;overflow:hidden}
.ph-img::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 14px,rgba(255,255,255,.016) 14px,rgba(255,255,255,.016) 28px)}

@media(max-width:640px){
  .nav-links{display:none}
  .gallery{grid-template-columns:repeat(2,1fr)}
  .si{padding:0 24px}
  .flight-row{grid-template-columns:1fr 1fr}
  .flight-cost{grid-column:1/-1;text-align:left}
}
</style>
</head>

/* ── HELPERS ──────────────────────────────────────────────────────── */
function useFI(){
  const ref=useRef();
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){el.classList.add('vis');obs.disconnect();}},{threshold:.1});
    obs.observe(el);return()=>obs.disconnect();
  },[]);
  return ref;
}

function goTo(id){
  const el=document.getElementById(id);
  if(el) window.scrollTo({top:el.getBoundingClientRect().top+window.pageYOffset-68,behavior:'smooth'});
}

/* ── STARS ────────────────────────────────────────────────────────── */
function Stars(){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current;if(!c)return;
    const ctx=c.getContext('2d');
    const resize=()=>{c.width=c.offsetWidth;c.height=c.offsetHeight;};
    resize();
    const stars=Array.from({length:210},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.5+.2,a:Math.random()*.75+.15,s:Math.random()*.35+.08,ph:Math.random()*Math.PI*2}));
    let t=0,frame;
    const draw=()=>{
      ctx.clearRect(0,0,c.width,c.height);
      stars.forEach(s=>{
        ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(185,220,255,${s.a*(0.45+0.55*Math.sin(t*s.s+s.ph))})`;ctx.fill();
      });
      t+=.018;frame=requestAnimationFrame(draw);
    };
    draw();window.addEventListener('resize',resize);
    return()=>{cancelAnimationFrame(frame);window.removeEventListener('resize',resize);};
  },[]);
  return <canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%'}}/>;
}

/* ── COUNTDOWN ────────────────────────────────────────────────────── */
function useCd(date){
  const[t,setT]=useState({});
  useEffect(()=>{
    const tick=()=>{
      const d=new Date(date)-Date.now();
      if(d<=0){setT({days:0,hours:0,mins:0,secs:0});return;}
      setT({days:Math.floor(d/864e5),hours:Math.floor(d%864e5/36e5),mins:Math.floor(d%36e5/6e4),secs:Math.floor(d%6e4/1e3)});
    };
    tick();const id=setInterval(tick,1e3);return()=>clearInterval(id);
  },[date]);
  return t;
}

            <tbody>
              {BUDGET.map(b=>(
                <tr key={b.cat}>
                  <td style={{color:'var(--text)'}}>{b.cat}</td>
                  <td style={{color:'var(--accent)',fontFamily:'monospace'}}>{fmt(b.low)}</td>
                  <td style={{color:'var(--muted)',fontFamily:'monospace'}}>{fmt(b.high)}</td>
                  <td><div className="bbar-bg"><div className="bbar" style={{width:`${b.high/maxV*100}%`,background:b.cat.includes('qualia')?'var(--gold)':'var(--accent)'}}/></div></td>
                  <td style={{color:'var(--muted)',fontSize:11}}>{b.note}</td>
                </tr>
              ))}
              <tr style={{borderTop:'2px solid var(--border)'}}>
                <td style={{color:'var(--gold2)',fontWeight:600,fontSize:14}}>Total (2 people)</td>
                <td style={{color:'var(--gold)',fontFamily:'monospace',fontWeight:700}}>{fmt(tL)}</td>
                <td style={{color:'var(--gold2)',fontFamily:'monospace',fontWeight:700}}>{fmt(tH)}</td>
                <td></td>
                <td style={{fontSize:11,color:'var(--muted)'}}>Excl. honeymoon extras</td>
              </tr>
            </tbody>
          </table>
        </div>
        <p style={{marginTop:14,fontSize:12,color:'var(--muted)'}}>💡 Book international flights and qualia early — both are time-sensitive and represent the largest share of total cost.</p>
      </div>
    </div>
  );
}

/* ── TWEAKS ───────────────────────────────────────────────────────── */
const TWEAK_DEFAULTS=/*EDITMODE-BEGIN*/{"tripDate":"2027-03-10","names":"Matt & Emma","showBudget":true}/*EDITMODE-END*/;

function TweaksPanel({tweaks,setTweak,onClose}){
  return(
    <div style={{position:'fixed',bottom:20,right:20,width:275,background:'#182840',border:'1px solid #1d3450',borderRadius:12,padding:'16px 18px',boxShadow:'0 10px 48px rgba(0,0,0,.65)',zIndex:9999,fontFamily:'var(--sans)',fontSize:13,color:'#ddeeff'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <span style={{fontWeight:600,letterSpacing:'.06em'}}>Tweaks</span>
        <button onClick={onClose} style={{background:'none',border:'none',color:'#5e7a96',cursor:'pointer',fontSize:22,lineHeight:1,padding:0}}>×</button>
      </div>
      <label style={{fontSize:10,color:'#5e7a96',letterSpacing:'.13em',textTransform:'uppercase',display:'block',marginBottom:5}}>Departure Date</label>
      <input type="date" value={tweaks.tripDate} onChange={e=>setTweak('tripDate',e.target.value)} style={{width:'100%',background:'#091522',border:'1px solid #1d3450',borderRadius:6,padding:'7px 10px',color:'#ddeeff',fontFamily:'var(--sans)',fontSize:13,marginBottom:13}}/>
      <label style={{fontSize:10,color:'#5e7a96',letterSpacing:'.13em',textTransform:'uppercase',display:'block',marginBottom:5}}>Names</label>
      <input type="text" value={tweaks.names} onChange={e=>setTweak('names',e.target.value)} style={{width:'100%',background:'#091522',border:'1px solid #1d3450',borderRadius:6,padding:'7px 10px',color:'#ddeeff',fontFamily:'var(--sans)',fontSize:13,marginBottom:13}}/>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <label style={{fontSize:10,color:'#5e7a96',letterSpacing:'.13em',textTransform:'uppercase'}}>Show Budget</label>
        <input type="checkbox" checked={tweaks.showBudget} onChange={e=>setTweak('showBudget',e.target.checked)} style={{accentColor:'var(--accent)',width:16,height:16,cursor:'pointer'}}/>
      </div>
    </div>
  );
}

/* ── APP ──────────────────────────────────────────────────────────── */
function App(){
  const[tweaks,setTweaksState]=useState(TWEAK_DEFAULTS);
  const[showTweaks,setShowTweaks]=useState(false);

  const setTweak=(k,v)=>setTweaksState(prev=>{
    const next={...prev,[k]:v};
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:next},'*');
    return next;
  });

  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode') setShowTweaks(true);
      if(e.data?.type==='__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const nav=[['map','Map'],['itinerary','Itinerary'],['destinations','Hotels'],['gallery','Gallery'],['flights','Flights'],['swaps','Swap Menu'],['packing','Packing'],['bucket','Bucket List'],...(tweaks.showBudget?[['budget','Budget']]:[])];

  return(
    <div>
      <nav className="nav">
        <div className="nav-brand">{tweaks.names} · 2027</div>
        <ul className="nav-links">
          {nav.map(([id,l])=>(
            <li key={id}><a href={'#'+id} onClick={e=>{e.preventDefault();goTo(id);}}>{l}</a></li>
          ))}
        </ul>
      </nav>
      <Hero tripDate={tweaks.tripDate} names={tweaks.names}/>
      <div className="divider"/>
      <MapSection/>
      <div className="divider"/>
      <ItinSection/>
      <div className="divider"/>
      <SpotsSection/>
      <div className="divider"/>
      <GallerySection/>
      <div className="divider"/>
      <FlightsSection/>
      <div className="divider"/>
      <SwapSection/>
      <div className="divider"/>
      <PackingSection/>
      <div className="divider"/>
      <BucketSection/>
      {tweaks.showBudget&&<><div className="divider"/><BudgetSection/></>}
      <footer className="footer">
        <p className="fq">"{tweaks.names} — forever begins in March 2027"</p>
        <p className="fm">Washington DC · Australia · New Zealand · 14 days · A lifetime of memories</p>
      </footer>
      {showTweaks&&(
        <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={()=>{setShowTweaks(false);window.parent.postMessage({type:'__edit_mode_dismissed'},'*');}}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
